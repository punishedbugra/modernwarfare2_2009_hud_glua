MW2HUD.Disable.Weapon=Dälj vapeninfo
MW2HUD.Disable.Weapon.desc=Döljer vapnets namn, ammo räknaren och kompassen.\n\nOmaktiverar standard HL2 ammo räknare.

MW2HUD.Disable.Splash=Dölj dråpmeddelanden
MW2HUD.Disable.Splash.desc=Döljer dråpmeddelanden och avaktiverar deras ljudeffekter.

MW2HUD.Disable.XP=Dölj EP-räknare
MW2HUD.Disable.XP.desc=Döljer EP-räknaren.

MW2HUD.Disable.Prompt=Dölj vapennotiser
MW2HUD.Disable.Prompt.desc=Döljer vapennotiserna, inklusive "Ladda om", "Låg ammo" och "Ingen ammo".


# Client
MW2HUD.Client=Klientinställningar

# Factions
MW2HUD.Faction.Select=Välj team
MW2HUD.Faction.Select.desc=Välj vilket team du vill representera.\nPåverkar din "vän eller fiende"-status och ändrar din kommentator och tema för att matcha teamet.

MW2HUD.Faction.SelectAgain=Du kan ändra team i Spawnmenyn under Options > MW2 > Klientinställningar.

# Disable Options
MW2HUD.Disable=Döljningsinställningar
MW2HUD.Disable.desc=Håll pekaren över inställningen för att se exakt vad som kommer döljas.

MW2HUD.Disable.OnFoot=Till fots
MW2HUD.Disable.InVeh=Under körning

MW2HUD.Disable.Map=Dölj karta
MW2HUD.Disable.Map.desc=Döljer minikartan.

MW2HUD.Disable.Score=Dölj poängräknare

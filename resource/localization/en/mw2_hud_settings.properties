#---------- MW2 HUD Settings | English
# Translator: Moka

# Client
MW2HUD.Title=MW2 HUD

MW2HUD.OpenMenu=Open MW2 HUD Menu

MW2HUD.Client=Client Settings
MW2HUD.Server=Server Settings

# Factions
MW2HUD.Faction.Select=Faction Select
MW2HUD.Faction.Select.desc=Choose which faction to represent.\nAffects your Friend-or-Foe status and changes your announcer and theme to match the faction.

MW2HUD.Faction.SelectAgain=You can change faction in the Spawnmenu under Options > MW2 > Client Settings.

# Admin
MW2HUD.Admin=Admin Settings

MW2HUD.Admin.Score=Score Limit
MW2HUD.Admin.Score.desc=Sets the maximum score limit present on the Score counter.\nSet to 0 for "Unlimited", i.e. always lowest value.

MW2HUD.Admin.EndScreen=Enable "End of Match"
MW2HUD.Admin.EndScreen.desc=Enables an "end of match" system once the score limit is reached.

MW2HUD.Admin.EndScreen.StartNext=Start Next Round after End of Match
MW2HUD.Admin.EndScreen.StartNext.desc=If enabled, once the end of match duration expires, a new round will begin.\nIf disabled, all players will respawn normally.

# Other
MW2HUD.DisableAll.Title=Quick-Disable

MW2HUD.DisableAll.HUD=Quick-Disable All HUD Options
MW2HUD.DisableAll.HUD.desc=Disables all MW2 HUD options.

MW2HUD.DisableAll.audio=Quick-Disable All Audio Options
MW2HUD.DisableAll.audio.desc=Disables all MW2 Audio options.

MW2HUD.Menu=Menu Options

MW2HUD.Menu.Fullscreen=Display the HUD Menu in fullscreen
MW2HUD.Menu.Fullscreen.desc=The HUD Menu will cover the whole screen instead of being a smaller window.\n\nWill come with a new "Close" button, and disables the ability to drag the menu around.

# Sounds
MW2HUD.Audio=Audio Options

MW2HUD.Audio.Announcer=Enable Announcer Voice
MW2HUD.Audio.Announcer.desc=Enables the announcer.

MW2HUD.Audio.Music=Enable Music
MW2HUD.Audio.Music.desc=Enables music.

MW2HUD.Audio.Announcer.English=Force English Announcer
MW2HUD.Audio.Announcer.English.desc=Forces the English announcer voices to play, regardless of game language.

MW2HUD.Audio.Ambient=Enable Ambient Music
MW2HUD.Audio.Ambient.desc=Enables ambient music playing in the background.

# HUD
MW2HUD.Enable.Options=HUD Options

MW2HUD.Enable.Outline=Outlined Text
MW2HUD.Enable.Outline.desc=Activates outlined texts on some elements to make them easier to read in really bright areas.\nAffects: Challenge & Kill Messages, Score Counter, Scoreboard, End of Match and Round Start.

MW2HUD.Enable.Score=Enable Score Counter
MW2HUD.Enable.Score.desc=Enables the server timer, faction icon and score counters.
MW2HUD.Enable.Score.tip=Tip: If disabled, recommend to disable the Announcer Voice and Music as well.

MW2HUD.Enable.Splash=Enable Kill Messages
MW2HUD.Enable.Splash.desc=Enables the kill messages, and disables their associated sounds.

MW2HUD.Enable.Splash.Outline=Kill Messages - Outlines
MW2HUD.Enable.Splash.Outline.desc=Enables outlined text on the kill messages.

MW2HUD.Enable.Splash.Speedup=Kill Messages - Speed Up
MW2HUD.Enable.Splash.Speedup.desc=If enabled, the Kill Messages will move on faster if there are many of them queued up.\nAlso prevents the associated SFX from playing if there's more than 3 messages in the queue.

MW2HUD.Enable.Feed=Enable Kill Feed
MW2HUD.Enable.Feed.desc=Enables the kill feed.

MW2HUD.Enable.Map=Enable Minimap
MW2HUD.Enable.Map.desc=Enables the minimap.

MW2HUD.Enable.Hitmarker=Enable Hitmarker
MW2HUD.Enable.Hitmarker.desc=Enables the hitmarker and its associated hit sound.

MW2HUD.Enable.Weapon=Enable Weapon Info
MW2HUD.Enable.Weapon.desc=Enables the weapon name, ammo counter and compass.\n\nRe-enables the default HL2 ammo counter.

MW2HUD.Enable.XP=Enable XP Counter
MW2HUD.Enable.XP.desc=Enables the XP counter.

MW2HUD.Enable.Target=Enable Target ID
MW2HUD.Enable.Target.desc=Enables the target's name above their head when aiming near them.

MW2HUD.Enable.DeathIcon=Enable Death Icon
MW2HUD.Enable.DeathIcon.desc=Enables the death icon.

MW2HUD.Enable.Prompt=Enable Weapon Prompts
MW2HUD.Enable.Prompt.desc=Enables the weapon prompts, including "Reload", "Low Ammo" and "No Ammo".

MW2HUD.Enable.Chat=Enable Chat
MW2HUD.Enable.Chat.desc=Enables the chat.

MW2HUD.Enable.Challenges=Enable Challenge Prompts
MW2HUD.Enable.Challenges.desc=Enables the challenge prompts.\nDoes not affect the tracking of challenges, nor the unlocking of them.

MW2HUD.Enable.Scoreboard=Enable Scoreboard
MW2HUD.Enable.Scoreboard.desc=Enables the scoreboard.

MW2HUD.Enable.Throwback=Enable Grenade Throw Back Prompt
MW2HUD.Enable.Throwback.desc=Enables a 'Throw back' prompt whenever near a grenade.

# Round Start
MW2HUD.RoundStart=Round Start

MW2HUD.RoundStart.Gamemode=Gamemode Select
MW2HUD.RoundStart.Start=Begin Round Start Process
MW2HUD.RoundStart.Admin=This is an Admin-only process!

MW2HUD.RoundStart.Notice=Are you sure you want to start a new round?\nAll scores will be reset, and all players will respawn.
MW2HUD.RoundStart.Yes=Yes, let's do this
MW2HUD.RoundStart.No=No
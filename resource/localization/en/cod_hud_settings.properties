#---------- CoD HUD Settings | English
# Translator: Moka

# ------------------[ GENERAL ]------------------
CoDHUD.Title=CoD HUD

CoDHUD.Client=Client
CoDHUD.Server=Server
CoDHUD.General=General

# ------------------[ ADMIN SETTINGS ]------------------
# ---------[ ROUND START ]---------
CoDHUD.RoundStart=Round Start

CoDHUD.RoundStart.Gamemode=Gamemode Select
CoDHUD.RoundStart.Start=Begin Round Start Process
CoDHUD.RoundStart.Info=Select a gamemode, then press the button below.

CoDHUD.RoundStart.Notice=Are you sure you want to start a new round?\nAll scores will be reset, and all players will respawn.
CoDHUD.RoundStart.Yes=Begin Round
CoDHUD.RoundStart.No=Cancel

CoDHUD.RoundStart.Timer=Round Start Timer
CoDHUD.RoundStart.Timer.desc=How many seconds of intermission should there be before the round begins.

CoDHUD.Scorelimit=Score Limit
CoDHUD.Scorelimit.desc=Sets the maximum score limit present on the Score counter.\nMeasured in kills.

CoDHUD.Timelimit=Time Limit
CoDHUD.Timelimit.desc=Sets the time limit before the round auto-ends.\nMeasured in minutes.\nSet to 0 for unlimited.

# ---------[ ROUND END ]---------
CoDHUD.Admin.EndScreen=Enable "End of Match"
CoDHUD.Admin.EndScreen.desc=Enables an "end of match" system once the score limit is reached.

CoDHUD.Admin.EndScreen.StartNext=Start Next Round after End of Match
CoDHUD.Admin.EndScreen.StartNext.desc=If enabled, once the end of match duration expires, a new round will begin.\nIf disabled, all players will respawn normally.

CoDHUD.Admin.FriendlyFire=Allow Friendly Fire
CoDHUD.Admin.FriendlyFire.desc=If enabled, players on the same faction can damage one another.

# ---------[ FACTION & HUD TYPE RESTRICTION ]---------
CoDHUD.Admin.RestrictType=Restrict Factions and HUD Type
CoDHUD.Admin.RestrictType.desc=Choose which CoD type to restrict users to. Changing this value will randomize every player's current faction.\n\nThis will affect every player's:\n- Faction selection \n- CoD HUD Menu background and SFX

CoDHUD.Type.CoD4=Call of Duty 4: Modern Warfare
CoDHUD.Type.WaW=Call of Duty: World at War
CoDHUD.Type.MW2=Call of Duty: Modern Warfare 2
CoDHUD.Type.BO=Call of Duty: Black Ops
CoDHUD.Type.MW3=Call of Duty: Modern Warfare 3
CoDHUD.Type.BO2=Call of Duty: Black Ops II

# ------------------[ CLIENT SETTINGS ]------------------
# ---------[ FACTION-RELATED ]---------
CoDHUD.Faction.Select=Faction Select
CoDHUD.Faction.Select.desc=Choose which faction to represent.\nAffects your Friend-or-Foe status and changes your announcer and theme to match the faction.
CoDHUD.Faction.SelectAgain=You can change faction via the "CoD HUD" option in the Context Menu.

# ---------[ QUICK-ACCESS ]---------
CoDHUD.Quick.title=Quick-Access

CoDHUD.Quick.DisableHUD=Quick-Disable All HUD Options
CoDHUD.Quick.DisableHUD.desc=Disables all CoD HUD options.

# ---------[ AUDIO-RELATED ]---------
CoDHUD.Audio=Audio Settings
CoDHUD.Audio.Announcer=Announcer
CoDHUD.Audio.Music=Music

CoDHUD.Audio.Announcer.Enable=Enable Announcer Voice
CoDHUD.Audio.Announcer.Enable.desc=Enables the announcer.

CoDHUD.Audio.Announcer.English=Force English Announcer
CoDHUD.Audio.Announcer.English.desc=Forces the English announcer voices to play, regardless of game language.

CoDHUD.Audio.Music.Enable=Enable Music
CoDHUD.Audio.Music.Enable.desc=Enables music.

CoDHUD.Audio.Music.Ambient=Enable Ambient Music
CoDHUD.Audio.Music.Ambient.desc=Enables ambient music playing in the background.

# ---------[ HUD-RELATED ]---------
CoDHUD.HUD=HUD Settings

# Multiple
CoDHUD.HUD.Outline=Outlined Text
CoDHUD.HUD.Outline.desc=Activates outlined texts on some elements to make them easier to read in really bright areas.

CoDHUD.HUD.Sound=Play SFX
CoDHUD.HUD.Sound.desc=Plays associated sound effects if the HUD Type supports it.

CoDHUD.HUD.Time.Total=Active Time
CoDHUD.HUD.Time.Total.desc=How long the variable remains on-screen after fully fading in before it fades back out.

CoDHUD.HUD.Time.Fadein=Fade-in Time
CoDHUD.HUD.Time.Fadein.desc=How long it takes for this variable to fade in.

CoDHUD.HUD.Time.Fadeout=Fade-out Time
CoDHUD.HUD.Time.Fadeout.desc=How long it takes for this variable to fade out.

# Scoreboard
CoDHUD.HUD.Scoreboard=Scoreboard

CoDHUD.HUD.Scoreboard.Enable=Enable Scoreboard
CoDHUD.HUD.Scoreboard.Enable.desc=Enables the Scoreboard. Displays the factions currently occupied by all players.

# Score Counter
CoDHUD.HUD.Scorecounter=Score Counter

CoDHUD.HUD.Scorecounter.Enable=Enable Score Counter
CoDHUD.HUD.Scorecounter.Enable.desc=Enables a server timer, faction icon and score counters.\nSome HUD Types won't display the faction icon.

# Medals
CoDHUD.HUD.Medals=Medals

CoDHUD.HUD.Medals.Enable=Enable Medals
CoDHUD.HUD.Medals.Enable.desc=Enables medals, achieved by performing certain actions, such as quick kills or headshots.\nNote that some HUD Types have text only, while some have text and icons.

CoDHUD.HUD.Medals.Speedup=Faster if long queue
CoDHUD.HUD.Medals.Speedup.desc=Speeds up the medal queue if there's many of them queued up at once.\nDepending on the HUD Type, also disables the associated SFX if there's more than 3 medals queued.

# Kill Feed
CoDHUD.HUD.Killfeed=Kill Feed

CoDHUD.HUD.Killfeed.Enable=Enable Kill Feed
CoDHUD.HUD.Killfeed.Enable.desc=Enables the kill feed.

# Minimap
CoDHUD.HUD.Minimap=Minimap

CoDHUD.HUD.Minimap.Enable=Enable Minimap
CoDHUD.HUD.Minimap.Enable.desc=Enables the minimap.

# Hitmarker
CoDHUD.HUD.Hitmarker=Hitmarker

CoDHUD.HUD.Hitmarker.Enable=Enable Hitmarker
CoDHUD.HUD.Hitmarker.Enable.desc=Enables the hitmarker and its associated hit sound.

# Weapon Info
CoDHUD.HUD.WeaponInfo=Weapon Info

CoDHUD.HUD.WeaponInfo.Enable=Enable Weapon Info
CoDHUD.HUD.WeaponInfo.Enable.desc=Enables the weapon info tab, displaying the weapon name and ammo counter.\nSome HUD Types incorporate the compass here too.

CoDHUD.HUD.WeaponPrompts.Enable=Enable Weapon Prompts
CoDHUD.HUD.WeaponPrompts.Enable.desc=Enables weapon prompts, such as low ammo notifications.

# XP Counter
CoDHUD.HUD.XP=XP Prompt

CoDHUD.HUD.XP.Enable=Enable XP Prompt
CoDHUD.HUD.XP.Enable.desc=Enables XP prompts.

# Target ID / IFF
CoDHUD.HUD.IFF=Identify Friend-or-Foe

CoDHUD.HUD.IFF.Enable=Enable IFF
CoDHUD.HUD.IFF.Enable.desc=Enables a "Identify Friend-or-Foe" system, displaying the target's name above their heads when aiming near them.

# Death Icon
CoDHUD.HUD.DeathIcon=Death Icon

CoDHUD.HUD.DeathIcon.Enable=Enable Death Icon
CoDHUD.HUD.DeathIcon.Enable.desc=Enables the death icon, displayed where any player on the same faction dies.

# Chat
CoDHUD.HUD.Chat=Chat

CoDHUD.HUD.Chat.Enable=Enable Chat
CoDHUD.HUD.Chat.Enable.desc=Enables the chat.

# Challenges
CoDHUD.HUD.Challenges=Challenges

CoDHUD.HUD.Challenges.Enable=Enable Challenge Prompts
CoDHUD.HUD.Challenges.Enable.desc=Enables challenge prompts.\nDoes not affect the tracking of challenges, nor the unlocking of them.


# ---------[ COD HUD MENU RELATED ]---------
CoDHUD.MenuSettings=Menu Settings

# Fullscreen
CoDHUD.Menu.Fullscreen=Open in Fullscreen
CoDHUD.Menu.Fullscreen.desc=Opens the CoD HUD Menu in fullscreen instead of a smaller window.
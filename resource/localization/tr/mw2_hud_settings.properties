#---------- MW2 HUD Settings | Turkish
# Translator: Claude (TR Localization)

# Client
MW2HUD.Title=MW2 HUD

MW2HUD.OpenMenu=MW2 HUD Menüsünü Aç

MW2HUD.Client=İstemci Ayarları
MW2HUD.Server=Sunucu Ayarları

# Factions
MW2HUD.Faction.Select=Takım Seç
MW2HUD.Faction.Select.desc=Hangi takımı temsil edeceğini seç.\nDost-düşman durumunu etkiler; spikerini ve müziğini takımına göre değiştirir.

MW2HUD.Faction.SelectAgain=Takımını Spawnmenu > Seçenekler > MW2 > İstemci Ayarları üzerinden değiştirebilirsin.

# Admin
MW2HUD.Admin=Admin Ayarları

MW2HUD.Admin.Score=Skor Limiti
MW2HUD.Admin.Score.desc=Skor sayacındaki maksimum skor limitini belirler.\n"Sınırsız" için 0 gir; skor hep en düşük değerde kalır.

MW2HUD.Admin.EndScreen="Maç Sonu" Ekranını Aç
MW2HUD.Admin.EndScreen.desc=Skor limitine ulaşıldığında "maç sonu" sistemini devreye sokar.

MW2HUD.Admin.EndScreen.StartNext=Maç Sonu'nun ardından Yeni Raund Başlasın
MW2HUD.Admin.EndScreen.StartNext.desc=Açıksa, maç sonu süresi dolduğunda yeni bir raund başlar.\nKapalıysa, oyuncular normal şekilde yeniden doğar.

# MW2HUD.Admin.FriendlyFire=Allow Friendly Fire
# MW2HUD.Admin.FriendlyFire.desc=If enabled, players on the same faction can damage one another.

# Other
MW2HUD.DisableAll.Title=Hızlı Kapat

MW2HUD.DisableAll.HUD=Tüm HUD Seçeneklerini Anında Kapat
MW2HUD.DisableAll.HUD.desc=Tüm MW2 HUD seçeneklerini devre dışı bırakır.

MW2HUD.DisableAll.audio=Tüm Ses Seçeneklerini Anında Kapat
MW2HUD.DisableAll.audio.desc=Tüm MW2 ses seçeneklerini devre dışı bırakır.

MW2HUD.Menu=Menü Seçenekleri

MW2HUD.Menu.Fullscreen=HUD Menüsünü Tam Ekran Göster
MW2HUD.Menu.Fullscreen.desc=HUD menüsü küçük bir pencere yerine tüm ekranı kaplar.\n\nYeni bir "Kapat" butonu eklenir ve menüyü sürükleme özelliği devre dışı kalır.

# Sounds
MW2HUD.Audio=Ses Seçenekleri

MW2HUD.Audio.Announcer=Spiker Sesini Aç
MW2HUD.Audio.Announcer.desc=Spikeri etkinleştirir.

MW2HUD.Audio.Music=Müziği Aç
MW2HUD.Audio.Music.desc=Müziği etkinleştirir.

MW2HUD.Audio.Announcer.English=İngilizce Spikeri Zorla
MW2HUD.Audio.Announcer.English.desc=Oyun dili ne olursa olsun spikerin İngilizce seslerini oynatır.

MW2HUD.Audio.Ambient=Ortam Müziğini Aç
MW2HUD.Audio.Ambient.desc=Arka planda çalan ortam müziğini etkinleştirir.

# HUD
MW2HUD.Enable.Options=HUD Seçenekleri

MW2HUD.Enable.Outline=Konturlu Yazı
MW2HUD.Enable.Outline.desc=Bazı öğelerin yazılarına kontur ekler; aşırı aydınlık sahnelerde okumayı kolaylaştırır.\nEtkilenenler: Görev ve Öldürme Mesajları, Skor Sayacı, Skor Tablosu, Maç Sonu ve Raund Başlangıcı.

MW2HUD.Enable.Score=Skor Sayacını Aç
MW2HUD.Enable.Score.desc=Sunucu zamanlayıcısını, takım ikonunu ve skor sayaçlarını açar.
MW2HUD.Enable.Score.tip=İpucu: Bunu kapatırsan, Spiker Sesini ve Müziği de kapatman önerilir.

MW2HUD.Enable.Splash=Öldürme Mesajlarını Aç
MW2HUD.Enable.Splash.desc=Öldürme mesajlarını açar; ilgili sesleri ise devre dışı bırakır.

MW2HUD.Enable.Splash.Outline=Öldürme Mesajları - Kontur
MW2HUD.Enable.Splash.Outline.desc=Öldürme mesajlarında konturlu yazıyı açar.

MW2HUD.Enable.Splash.Speedup=Öldürme Mesajları - Hızlandır
MW2HUD.Enable.Splash.Speedup.desc=Açıksa, sırada birden fazla öldürme mesajı varsa akış hızlanır.\nAyrıca 3'ten fazla mesaj sırada bekliyorsa ilgili ses efektlerinin çalınmasını engeller.

MW2HUD.Enable.Feed=Öldürme Akışını Aç
MW2HUD.Enable.Feed.desc=Öldürme akışını (kill feed) açar.

MW2HUD.Enable.Map=Mini Haritayı Aç
MW2HUD.Enable.Map.desc=Mini haritayı açar.

MW2HUD.Enable.Hitmarker=İsabet İşaretini Aç
MW2HUD.Enable.Hitmarker.desc=İsabet işaretini (hitmarker) ve ses efektini açar.

MW2HUD.Enable.Weapon=Silah Bilgisini Aç
MW2HUD.Enable.Weapon.desc=Silah adını, mermi sayacını ve pusulayı açar.\n\nVarsayılan HL2 mermi sayacını tekrar etkinleştirir.

MW2HUD.Enable.XP=XP Sayacını Aç
MW2HUD.Enable.XP.desc=XP sayacını açar.

MW2HUD.Enable.Target=Hedef Kimliğini Aç
MW2HUD.Enable.Target.desc=Hedefin yakınına nişan aldığında adını başının üstünde gösterir.

MW2HUD.Enable.DeathIcon=Ölüm İkonunu Aç
MW2HUD.Enable.DeathIcon.desc=Ölüm ikonunu açar.

MW2HUD.Enable.Prompt=Silah Uyarılarını Aç
MW2HUD.Enable.Prompt.desc="Şarjör Değiştir", "Düşük Mermi" ve "Mermi Yok" gibi silah uyarılarını açar.

MW2HUD.Enable.Chat=Sohbeti Aç
MW2HUD.Enable.Chat.desc=Sohbeti açar.

MW2HUD.Enable.Challenges=Görev Bildirimlerini Aç
MW2HUD.Enable.Challenges.desc=Görev bildirimlerini açar.\nGörevlerin takibini ya da açılmasını etkilemez.

MW2HUD.Enable.Scoreboard=Skor Tablosunu Aç
MW2HUD.Enable.Scoreboard.desc=Skor tablosunu açar.

MW2HUD.Enable.Throwback=Bomba Geri Atma Uyarısını Aç
MW2HUD.Enable.Throwback.desc=Yakınında bomba olduğunda "Geri at" uyarısını gösterir.

# Round Start
MW2HUD.RoundStart=Raund Başlat

MW2HUD.RoundStart.Gamemode=Oyun Modu Seç
MW2HUD.RoundStart.Start=Raund Başlatma İşlemini Yürüt
MW2HUD.RoundStart.Admin=Bu işlem yalnızca Admin'e özeldir!

MW2HUD.RoundStart.Notice=Yeni bir raund başlatmak istediğine emin misin?\nTüm skorlar sıfırlanacak ve tüm oyuncular yeniden doğacak.
MW2HUD.RoundStart.Yes=Başlatalım bakalım
MW2HUD.RoundStart.No=Yok kalsın

# Scoreboard
CoDHUD.HUD.Scoreboard=Skor Tablosu

CoDHUD.HUD.Scoreboard.Enable=Skor Tablosunu Aç
CoDHUD.HUD.Scoreboard.Enable.desc=Temalı skor tablosunu açar. Oyuncuların bulunduğu takımları listeler.

# Score Counter
CoDHUD.HUD.Scorecounter=Skor Sayacı

CoDHUD.HUD.Scorecounter.Enable=Skor Sayacını Aç
CoDHUD.HUD.Scorecounter.Enable.desc=Temalı sunucu zamanlayıcısını, takım ikonunu ve skor sayaçlarını açar.\nBazı HUD tiplerinde takım ikonu gösterilmez.

# Medals
CoDHUD.HUD.Medals=Madalyalar

CoDHUD.HUD.Medals.Enable=Madalyaları Aç
CoDHUD.HUD.Medals.Enable.desc=Belirli aksiyonlarla (hızlı öldürme, kafadan atış vs.) kazanılan temalı madalyaları açar.\nİlgili ses efektlerini de devreye sokar.\nBazı HUD tiplerinde sadece yazı, bazılarında yazı ve ikon gözükür.

CoDHUD.HUD.Medals.Speedup=Sıra Uzunsa Hızlandır
CoDHUD.HUD.Medals.Speedup.desc=Aynı anda birden çok madalya birikirse sırayı hızlandırır.\nHUD Tipine göre, 3'ten fazla madalya sırada bekliyorsa ses efektlerini de devre dışı bırakır.

# Kill Feed
CoDHUD.HUD.Options.Killfeed=Öldürme Akışı

CoDHUD.HUD.Killfeed.Enable=Öldürme Akışını Aç
CoDHUD.HUD.Killfeed.Enable.desc=Temalı öldürme akışını (kill feed) açar.

# Minimap
CoDHUD.HUD.Minimap=Mini Harita

CoDHUD.HUD.Minimap.Enable=Mini Haritayı Aç
CoDHUD.HUD.Minimap.Enable.desc=Temalı mini haritayı açar.


CoDHUD.HUD.Time.Total=Ekranda Kalma Süresi
CoDHUD.HUD.Time.Total.desc=Öğe tamamen belirdikten sonra, kaybolmaya başlamadan önce ekranda kalma süresi.

CoDHUD.HUD.Time.Fadein=Belirme Süresi
CoDHUD.HUD.Time.Fadein.desc=Bu öğenin ekranda belirme süresi.

CoDHUD.HUD.Time.Fadeout=Kaybolma Süresi
